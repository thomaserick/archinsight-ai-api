
services:

  postgres:
    image: postgres:latest
    container_name: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: archinsight-ai-api
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: oficina@123
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  archinsight-ai-api:
    image: archinsight-ai-api:latest
    container_name: archinsight-ai-api
    depends_on:
      postgres:
        condition: service_healthy
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/archinsight-ai-api
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: oficina@123
      INTERNAL_API_KEY: 9f3c2e8a7b1d4f6a9c0e5d2b8a1f7c3e6d4b9a2f0c8e1d7a5b6c4
      NEW_RELIC_LICENSE_KEY: c0de859cc366a903281c3862910d7e0aFFFFNRAL

volumes:
  postgresql:
  postgres_data:
